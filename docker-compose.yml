services:
  mysql:
    image: mysql:8
    container_name: mysql_db
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=new_bej_sp3
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  app:
    image: maven:3.9.9-eclipse-temurin-21
    container_name: spring_app
    working_dir: /app
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    # Load biến môi trường từ file .env (không commit lên git)
    env_file:
      - .env

    environment:
      - SPRING_PROFILES_ACTIVE=docker
    # [QUAN TRỌNG] Ánh xạ code từ máy thật vào container
    volumes:
      - ./pom.xml:/app/pom.xml        # Link file cấu hình maven
      - ./src:/app/src                # Link toàn bộ source code
      - maven_repo:/root/.m2          # Lưu cache thư viện để không phải tải lại mỗi lần bật
      # Exclude target để tránh conflict
      - /app/target
    # [QUAN TRỌNG] Lệnh chạy trực tiếp code source
    command: mvn spring-boot:run

volumes:
  mysql_data:
  maven_repo:
